<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — DesiCalc</title>
  <meta name="description" content="Contact DesiCalc — reach out via email at desicalc@gmail.com for feedback, errors, or questions.">
  <link rel="canonical" href="https://desicalc.in/contact" />
  <link rel="alternate" hreflang="en" href="https://desicalc.in/contact" />
  <link rel="alternate" hreflang="x-default" href="https://desicalc.in/contact" />
  <meta property="og:title" content="Contact — DesiCalc">
  <meta property="og:description" content="Reach out via email at desicalc@gmail.com">
  <meta property="og:url" content="https://desicalc.in/contact">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="assets/css/tailwind.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/common.js"></script>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="DesiCalc" />
  <link rel="manifest" href="/site.webmanifest" />
</head>
<body class="bg-stone-50">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:p-2 focus:bg-white focus:z-50">Skip to content</a>

  <header class="sticky top-0 z-50 bg-white/95 backdrop-blur border-b border-stone-200">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="./" class="text-sm text-stone-500 hover:text-stone-900 no-underline" data-i18n="header.back">← Back</a>
        <a href="./" class="text-xl font-bold no-underline"><span class="text-stone-900">Desi</span><span class="text-amber-600">Calc</span></a>
        <span id="greeting" class="greeting-text hidden sm:inline" aria-live="polite"></span>
      </div>
      <div class="lang-toggle" role="group" aria-label="Language toggle">
        <button onclick="setLang('en')" class="active" data-lang-btn="en">EN</button>
        <button onclick="setLang('hi')" data-lang-btn="hi">Hing</button>
      </div>
    </div>
  </header>

  <main id="main-content" class="max-w-3xl mx-auto px-4 py-12">
    <h1 class="text-3xl font-bold text-stone-900 mb-6" data-i18n="contact.title">Contact Us</h1>

    <div class="prose prose-stone max-w-none">
      <p class="text-lg text-stone-600 leading-relaxed mb-6" data-i18n="contact.desc">
        Have feedback, found an error, or need help? Reach out to us.
      </p>

      <div class="card mb-8">
        <h2 class="text-xl font-bold text-stone-900 mb-4" data-i18n="contact.email.title">Email</h2>
        <p class="text-stone-600 mb-2" data-i18n="contact.email.desc">Write to us directly:</p>
        <a href="mailto:desicalc@gmail.com" class="text-2xl font-bold text-amber-600 hover:text-amber-700 no-underline">desicalc@gmail.com</a>
      </div>

      <div class="card">
        <h2 class="text-xl font-bold text-stone-900 mb-4" data-i18n="contact.github.title">GitHub</h2>
        <p class="text-stone-600" data-i18n="contact.github.desc">
          Report bugs or suggest features on our <a href="https://github.com/AyushmanDhar/DesiCalc" class="text-amber-600 underline hover:text-amber-700">GitHub repository</a>.
        </p>
      </div>
    </div>
  </main>

  <footer class="border-t border-stone-200 py-6 text-center text-sm text-stone-500">
    <div class="max-w-5xl mx-auto px-4 flex justify-center gap-x-6 gap-y-2 flex-wrap">
      <a href="about" data-i18n="footer.about">About</a>
      <a href="privacy" data-i18n="footer.privacy">Privacy</a>
      <a href="contact" class="text-amber-600" data-i18n="footer.contact">Contact</a>
    </div>
  </footer>

  <div id="toast" class="toast"></div>
  <button id="backToTop" class="back-to-top" aria-label="Back to top">↑</button>

  <script>
    initLang();
    initScrollReveal();
    initGreeting();
    initBackToTop();
    document.querySelectorAll('[data-lang-btn]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('[data-lang-btn]').forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
      });
    });
    onLangChange(function() {
      document.querySelectorAll('[data-lang-btn]').forEach(function(b) {
        b.classList.toggle('active', b.getAttribute('data-lang-btn') === getLang());
      });
    });
  </script>
  <script src="assets/js/ad.js"></script>
</body>
</html>
